server {
    # Listen on 3001 to match the Next.js dev convention
    listen 3001;
    server_name localhost;

    # Root points to the Next.js static export output
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache headers
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Try exact file → directory index → fallback to 404.html
    # This handles Next.js clean URLs (e.g. /about → /about.html)
    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    # Disable access logs for health check pings (keeps logs clean)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
