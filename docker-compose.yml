# =============================================================================
# Savi — Master Docker Compose
#
# Brings up all three services together:
#   • savi-backend  → .NET 8 API          → http://localhost:8080
#   • savi-portal   → Next.js dashboard   → http://localhost:8081
#   • savi-website  → Next.js static site → http://localhost:8082
#
# Usage:
#   docker compose up --build          # build images and start all services
#   docker compose up savi-backend     # start a single service
#   docker compose down                # stop and remove containers
#   docker compose logs -f             # tail logs from all services
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # savi-backend — .NET 8 REST API
  # Expects secrets (appsettings.*.json, Firebase credentials) mounted at
  # /etc/secrets/ — see the ENTRYPOINT in savi-backend/Dockerfile.
  # ---------------------------------------------------------------------------
  savi-backend:
    build:
      context: ./savi-backend
      dockerfile: Dockerfile
    container_name: savi-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # --- Secrets: set these in a .env file beside docker-compose.yml ---
      # The Deployer generates this .env file at runtime — never commit it.
      # Copy .env.example to .env and fill in real values before running.
      ConnectionStrings__PlatformDb: ${PLATFORM_DB_CONNECTION}
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID}
      Firebase__CredentialsJson: ${FIREBASE_CREDENTIALS_JSON}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - savi-net

  # ---------------------------------------------------------------------------
  # savi-portal — Next.js 14 standalone dashboard app
  # Talks to savi-backend via NEXT_PUBLIC_API_BASE_URL.
  # ---------------------------------------------------------------------------
  savi-portal:
    build:
      context: ./savi-portal
      dockerfile: Dockerfile
    container_name: savi-portal
    restart: unless-stopped
    ports:
      - "8081:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      # Point the portal at the backend service (Docker internal hostname)
      NEXT_PUBLIC_API_BASE_URL: http://savi-backend:8080
    depends_on:
      savi-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - savi-net

  # ---------------------------------------------------------------------------
  # savi-website — Next.js 14 static-export marketing/public site
  # Served by nginx on port 8082 (host) → 3001 (container).
  # ---------------------------------------------------------------------------
  savi-website:
    build:
      context: ./savi-website
      dockerfile: Dockerfile
    container_name: savi-website
    restart: unless-stopped
    ports:
      - "8082:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - savi-net

# Shared internal network — containers can reach each other by service name
networks:
  savi-net:
    driver: bridge
