# =============================================================================
# Savi — Master Docker Compose
#
# Brings up all three services together:
#   • savi-backend  → .NET 8 API          → http://localhost:8080
#   • savi-portal   → Next.js dashboard   → http://localhost:8081
#   • savi-website  → Next.js static site → http://localhost:8082
#
# Config strategy:
#   Secrets and production config live in ~/savi-config/ on the Mac Mini.
#   That folder is OUTSIDE the git repo and never committed.
#   Docker BuildKit pulls files from it via `additional_contexts` at build time.
#
# Usage:
#   docker compose up --build          # build images and start all services
#   docker compose up savi-backend     # start a single service
#   docker compose down                # stop and remove containers
#   docker compose logs -f             # tail logs from all services
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # savi-backend — .NET 8 REST API
  #
  # Config pulled from Mac Mini at build time:
  #   ~/savi-config/appsettings.json → baked into image
  #
  # The 'config' additional_context points BuildKit to ~/savi-config/.
  # The Dockerfile does: COPY --from=config appsettings.json .
  # ---------------------------------------------------------------------------
  savi-backend:
    build:
      context: ./savi-backend
      dockerfile: Dockerfile
      additional_contexts:
        # Points to the Mac Mini config folder — never committed to git
        config: /Users/dheeban/savi-config
    container_name: savi-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # All other config (DB, Firebase, Email etc.) comes from
      # appsettings.json baked into the image at build time
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - savi-net

  # ---------------------------------------------------------------------------
  # savi-portal — Next.js 14 standalone dashboard app
  #
  # Config pulled from Mac Mini at build time:
  #   ~/savi-config/.env.local → copied as .env.local before `next build`
  #   This makes NEXT_PUBLIC_* vars available at build time (required by Next.js)
  # ---------------------------------------------------------------------------
  savi-portal:
    build:
      context: ./savi-portal
      dockerfile: Dockerfile
      additional_contexts:
        # Points to the Mac Mini config folder — never committed to git
        config: /Users/dheeban/savi-config
    container_name: savi-portal
    restart: unless-stopped
    ports:
      - "8081:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    depends_on:
      savi-backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - savi-net

  # ---------------------------------------------------------------------------
  # savi-website — Next.js 14 static-export marketing/public site
  # Served by nginx on port 8082 (host) → 3001 (container).
  # No secrets needed — purely static, no server-side config.
  # ---------------------------------------------------------------------------
  savi-website:
    build:
      context: ./savi-website
      dockerfile: Dockerfile
    container_name: savi-website
    restart: unless-stopped
    ports:
      - "8082:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - savi-net

# Shared internal network — containers reach each other by service name
# e.g. savi-portal → http://savi-backend:8080
networks:
  savi-net:
    driver: bridge
